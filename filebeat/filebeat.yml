filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - drop_event:
      when:
        and:
          - has_fields: ['container.labels.filebeat_collect']
          - not:
              equals:
                container.labels.filebeat_collect: "true"
  - decode_json_fields:
      fields: ["message"]
      target: "app"
      overwrite_keys: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "app-logs-%{+yyyy.MM.dd}"

setup.ilm.enabled: false

setup.template.enabled: false

setup.kibana:
  host: "kibana:5601"

logging.level: info
