name: CI-Pipeline
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
  lint-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version: go.mod
      - name: Run core linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --config=.golangci.core.yaml
  lint-style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version: go.mod
      - name: Run style linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --config=.golangci.style.yaml
