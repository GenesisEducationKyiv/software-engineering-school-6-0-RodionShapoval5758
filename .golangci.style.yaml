version: "2"

run:
  timeout: 2m
  tests: true
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - canonicalheader
    - dupl
    - nlreturn
    - recvcheck
    - tagalign
  settings:
    dupl:
      threshold: 150

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - GithubReleaseNotificationAPI

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
